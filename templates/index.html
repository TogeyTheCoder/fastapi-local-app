<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local FastAPI App</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
    <script defer src="{{ url_for('static', path='script.js') }}"></script>
</head>
<body>
    <div class="container">
        <div class="card">

        </div>    
    </div>
</body>
</html>
